<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>forms</title>
    <link rel="stylesheet" href="CSS/form.css" />
  </head>
  <body>
    <form action="" method="">
      <input type="text" name="name" placeholder="Данил" value="" />
      <input type="text" name="surname" placeholder="Колбасенко" value="" />
      <br />
      <select name="country" id="">
        <option value="ru">Россия</option>
        <option value="de">Германия</option>
        <option value="fr">Франция</option>
        <option value="us">США</option>
      </select>
      <div class="info">
        <p>Дата рождения</p>
        <div class="circle"></div>
      </div>
      <div class="date-of-birth">
        <select name="day" id="">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
          <option value="11">11</option>
          <option value="12">12</option>
          <option value="13">13</option>
          <option value="14">14</option>
          <option value="15">15</option>
          <option value="16">16</option>
          <option value="17">17</option>
          <option value="18">18</option>
          <option value="19">19</option>
          <option value="20">20</option>
          <option value="21">21</option>
          <option value="22">22</option>
          <option value="23">23</option>
          <option value="24">24</option>
          <option value="25">25</option>
          <option value="26">26</option>
          <option value="27">27</option>
          <option value="28">28</option>
          <option value="29">29</option>
          <option value="30">30</option>
          <option value="31">31</option>
        </select>
        <select name="month" id="">
          <option value="jan">Января</option>
          <option value="feb">Февраля</option>
          <option value="mar">Марта</option>
          <option value="apr">Апреля</option>
          <option value="may">Мая</option>
          <option value="jun">Июня</option>
          <option value="jul">Июля</option>
          <option value="aug">Августа</option>
          <option value="sep">Сентября</option>
          <option value="oct">Октября</option>
          <option value="nov">Ноября</option>
          <option value="dec">Декабря</option>
        </select>
        <select name="year" id="">
          <option value="2002">2002</option>
          <option value="2003">2003</option>
          <option value="2004">2004</option>
          <option value="2005">2005</option>
          <option value="2006">2006</option>
          <option value="2007">2007</option>
        </select>
      </div>

      <hr />
      <input type="email" name="email" id="" value="" />
      <p>Это ваш новый Аккаунт</p>
      <input type="password" name="password" id="" value="" />
      <input type="password" name="conf-password" id="" value="" />
      <hr />

      <select name="phone-code" id="">
        <option value="7">+7 (Россия)</option>
        <option value="49">+49 (Германия)</option>
        <option value="33">+33 (Франция)</option>
        <option value="1">+1 (США)</option>
      </select>
      <p>
        Введите номер телефона, к которому у Вас всегда есть доступ. Этот номер
        будет использоваться для подтверждения личности при выполнении входа на
        новом устройстве или в браузере. За обмен сообщениями или передачу
        данных может взиматься плата.
      </p>

      <p>Подтверждение:</p>
      <div class="radio">
        <div>
          <input type="radio" name="verify" id="" value="text message" />
          <label for="">Текстовое сообщение</label>
        </div>
        <div>
          <input type="radio" name="verify" id="" value="pnone call" />
          <label for="">Телефонный звонок</label>
        </div>
      </div>
      <hr />

      <label for="">
        <input type="checkbox" name="" />
        Анонсы
        <span>
          Получайте сообщения электронной почты и другие уведомления от Apple, в
          том числе анонсы, рекламные материалы, рекомендации и информацию о
          новых продуктах, программном обеспечении и услугах компании
          Apple.</span
        >
      </label>

      <label for="">
        <input type="checkbox" name="" />
        Приложения, музыка, ТВ и многое другое
        <span>
          Получайте сообщения электронной почты и другие уведомления от Apple, в
          том числе о новых релизах, эксклюзивном контенте, специальных
          предложениях, а также рекламные материалы и рекомендации для
          приложений, музыки, фильмов, ТВ, книг, подкастов, Apple Pay и многого
          другого.</span
        >
      </label>
    </form>
    <button>Продолжить</button>
  </body>
</html>
